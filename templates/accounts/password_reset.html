{% extends 'base.html' %}
{% block title %}Recuperar Contraseña - Despacho Laboral{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-6 rounded shadow-lg w-full max-w-md border border-gray-300">
        <div class="text-center mb-6">
            <div class="text-4xl mb-3">🔐</div>
            <h1 class="text-lg font-bold text-gray-800">Recuperar Contraseña</h1>
            <p class="text-xs text-gray-500 mt-1">Ingresa tu correo electrónico</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" name="email" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="tu@correo.com">
            </div>
            <button type="submit"
                    class="w-full bg-gray-800 text-white py-2 px-4 rounded hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors text-sm font-medium">
                Enviar Instrucciones
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="{% url 'login' %}" class="text-sm text-gray-600 hover:text-gray-800">Volver al inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_head %}
<style>body { background: #1e293b; }</style>
{% endblock %}
