upstream despacho_app {
    server unix:/run/gunicorn/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name despacho.midominio.com;  # ← CAMBIA ESTO POR TU DOMINIO O IP

    # Redirigir a HTTPS (una vez que Certbot configure SSL)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name despacho.midominio.com;  # ← CAMBIA ESTO POR TU DOMINIO O IP

    # SSL (generados por Certbot)
    ssl_certificate /etc/letsencrypt/live/despacho.midominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/despacho.midominio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Archivos estáticos
    location /static/ {
        alias /opt/despacho-laboral/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos de media (subidos por usuarios)
    location /media/ {
        alias /opt/despacho-laboral/media/;
        expires 7d;
    }

    # Proxy para la app Django
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://despacho_app;
    }

    # Logs
    access_log /var/log/nginx/despacho-access.log;
    error_log /var/log/nginx/despacho-error.log;
}
